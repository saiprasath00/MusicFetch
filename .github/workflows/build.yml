name: Build & Release APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build 64-bit debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/MusicFetch-64bit.apk

      - name: Delete existing latest release (if any)
        run: gh release delete latest --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "MusicFetch - Latest Build"
          body: |
            **64-bit APK** — built automatically from the latest commit on `main`.

            ### Install
            1. Download `MusicFetch-64bit.apk` below
            2. On your Android phone: Settings → Security → Allow unknown sources
            3. Open the APK and tap Install

            > Requires Android 8.0+ (API 26), arm64-v8a or x86_64 device
          files: app/build/outputs/apk/debug/MusicFetch-64bit.apk
          prerelease: false
